<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<title>Offline — POS System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #eee;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  text-align: center;
}
.offline-card {
  background: #16213e;
  border-radius: 16px;
  padding: 48px 32px;
  max-width: 360px;
  width: 100%;
  border: 1px solid #2a2a4e;
}
.icon {
  font-size: 64px;
  margin-bottom: 16px;
  display: block;
}
h1 {
  font-size: 20px;
  margin-bottom: 12px;
  color: #e94560;
}
p {
  font-size: 14px;
  color: #a0a0b0;
  line-height: 1.5;
  margin-bottom: 24px;
}
.retry-btn {
  background: #e94560;
  color: #fff;
  border: none;
  padding: 12px 32px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  min-height: 48px;
  touch-action: manipulation;
}
.retry-btn:active { opacity: 0.8; }
</style>
</head>
<body>
<div class="offline-card">
  <span class="icon">📡</span>
  <h1>No Internet Connection</h1>
  <p>The POS system is currently offline. Please check your network connection and try again.</p>
  <button class="retry-btn" onclick="location.reload()">Try Again</button>
</div>
</body>
</html>
