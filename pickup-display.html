<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>Pickup Display Board</title>
<meta name="theme-color" content="#1a1a2e"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #e94560;
  --success: #00cc66;
  --warning: #f39c12;
  --text: #fff;
  --text2: #aaa;
  --new-color: #00cc66;
  --ready-color: #4fc3f7;
}

html, body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 20px;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 16px;
}

/* ── HEADER ── */
.pb-header {
  text-align: center;
  padding: 10px 0 16px;
  border-bottom: 2px solid #2a2a4e;
  flex-shrink: 0;
}

.pb-header h1 {
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.pb-header .subtitle {
  font-size: 1rem;
  color: var(--text2);
  margin-top: 4px;
}

.pb-header .count-badge {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  border-radius: 20px;
  padding: 4px 16px;
  font-size: 1rem;
  font-weight: 700;
  margin-top: 8px;
}

/* ── ORDER GRID ── */
.pb-grid {
  flex: 1;
  overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
  padding: 16px 0;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  align-content: start;
}

.pb-grid-empty {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  color: var(--text2);
  font-size: 1.5rem;
  gap: 16px;
}

/* ── ORDER CARD ── */
.pb-card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  border: 2px solid #2a2a4e;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
  animation: cardIn 0.4s ease-out;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.pb-card.status-new {
  border-color: var(--new-color);
  box-shadow: 0 0 20px rgba(0, 204, 102, 0.3);
  animation: cardIn 0.4s ease-out, pulseNew 2s ease-in-out 3;
}

@keyframes pulseNew {
  0%, 100% { box-shadow: 0 0 20px rgba(0, 204, 102, 0.3); }
  50% { box-shadow: 0 0 35px rgba(0, 204, 102, 0.6); }
}

.pb-card .order-number {
  font-size: 2.8rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}

.pb-card.status-new .order-number {
  color: var(--new-color);
}

.pb-card .new-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: var(--new-color);
  color: #000;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 1px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.pb-card .item-list {
  font-size: 0.95rem;
  color: var(--text2);
  line-height: 1.5;
  max-height: 100px;
  overflow: hidden;
}

.pb-card .item-list span {
  display: inline-block;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  padding: 2px 8px;
  margin: 2px 4px 2px 0;
  font-size: 0.9rem;
}

.pb-card .card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid #2a2a4e;
}

.pb-card .total {
  font-size: 1.2rem;
  font-weight: 700;
  color: #4fc3f7;
}

.pb-card .time-ago {
  font-size: 0.85rem;
  color: var(--text2);
}

.pb-card .collected-btn {
  background: transparent;
  border: 2px solid var(--success);
  color: var(--success);
  border-radius: 10px;
  padding: 8px 16px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 6px;
  width: 100%;
  transition: background 0.2s;
  min-height: 44px;
}

.pb-card .collected-btn:hover {
  background: rgba(0, 204, 102, 0.15);
}

.pb-card .collected-btn:active {
  transform: scale(0.97);
}

/* ── COLLECTED ANIMATION ── */
.pb-card.collected {
  animation: collectedOut 0.5s ease-in forwards;
  pointer-events: none;
}

@keyframes collectedOut {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.8); height: 0; padding: 0; margin: 0; border: 0; overflow: hidden; }
}

/* ── STATUS BAR ── */
.pb-status-bar {
  text-align: center;
  color: var(--text2);
  font-size: 0.9rem;
  padding: 8px 0;
  border-top: 1px solid #2a2a4e;
  flex-shrink: 0;
}

.pb-status-bar .dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  margin-right: 6px;
  animation: blink 1s infinite;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  body { font-size: 16px; padding: 8px; }
  .pb-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .pb-header h1 { font-size: 1.5rem; }
  .pb-card .order-number { font-size: 2.2rem; }
}

@media (min-width: 1200px) {
  .pb-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
  .pb-header h1 { font-size: 2.5rem; }
  .pb-card .order-number { font-size: 3.2rem; }
}
</style>
<script src="https://cdn.socket.io/4.8.1/socket.io.min.js" integrity="sha384-mkQ3/9F6QIkz1z7jC1Jfn5qO8ANMgS4zX9VX5G5WIQT2Q9F9M0cL0Kj2mF6KnC" crossorigin="anonymous"></script>
</head>
<body>

<!-- HEADER -->
<div class="pb-header">
  <h1>📋 Order Ready for Pickup</h1>
  <div class="subtitle" id="pbSubtitle">Orders awaiting collection</div>
  <div class="count-badge" id="pbCount">0 orders</div>
</div>

<!-- ORDER GRID -->
<div class="pb-grid" id="pbGrid">
  <div class="pb-grid-empty" id="pbEmpty">
    <div style="font-size:4rem;">✅</div>
    <div>No orders awaiting pickup</div>
    <div style="font-size:1rem;color:var(--text2);">Completed orders marked "Ready for Pickup" will appear here</div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="pb-status-bar">
  <span class="dot"></span> <span id="pbLiveStatus">Live — Updates automatically</span>
</div>

<script>
// ── CONFIG ──
const POLL_INTERVAL = 3000; // 3 seconds
const API_BASE = window.location.origin;

// ── DOM REFS ──
const pbGrid = document.getElementById('pbGrid');
const pbEmpty = document.getElementById('pbEmpty');
const pbCount = document.getElementById('pbCount');
const pbSubtitle = document.getElementById('pbSubtitle');
const pbLiveStatus = document.getElementById('pbLiveStatus');

// ── STATE ──
let previousOrderIds = '';

// ── HELPERS ──
function formatPrice(n) {
  return '$' + parseFloat(n).toFixed(2);
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  try {
    const dt = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - dt) / 1000);
    if (diff < 10) return 'just now';
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  } catch(e) { return ''; }
}

function updateClock() {
  // Update time-ago labels every 10s
  document.querySelectorAll('.time-ago').forEach(el => {
    const dateStr = el.dataset.time || '';
    el.textContent = timeAgo(dateStr);
  });
}

// ── RENDER ──
function renderQueue(queue) {
  if (!queue || queue.length === 0) {
    pbGrid.innerHTML = '<div class="pb-grid-empty" id="pbEmpty">' +
      '<div style="font-size:4rem;">✅</div>' +
      '<div>No orders awaiting pickup</div>' +
      '<div style="font-size:1rem;color:var(--text2);">Completed orders marked "Ready for Pickup" will appear here</div>' +
    '</div>';
    pbCount.textContent = '0 orders';
    return;
  }

  pbCount.textContent = queue.length + ' order' + (queue.length !== 1 ? 's' : '');
  let html = '';
  queue.forEach(o => {
    const statusClass = o.status === 'new' ? 'status-new' : '';
    const newBadge = o.status === 'new' ? '<div class="new-badge">🆕 NEW</div>' : '';
    let itemsHtml = '';
    if (o.items && o.items.length > 0) {
      const displayItems = o.items.slice(0, 5);
      itemsHtml = displayItems.map(item => {
        const name = item.name || 'Item';
        const qty = item.qty || 1;
        return '<span>' + qty + '× ' + name + '</span>';
      }).join('');
      if (o.items.length > 5) {
        itemsHtml += '<span style="color:var(--accent);font-weight:600;">+' + (o.items.length - 5) + ' more</span>';
      }
    }

    html += '<div class="pb-card ' + statusClass + '" data-order-id="' + o.order_id + '">' +
      newBadge +
      '<div class="order-number">#' + o.order_number + '</div>' +
      '<div class="item-list">' + itemsHtml + '</div>' +
      '<div class="card-footer">' +
        '<div class="total">' + formatPrice(o.total) + '</div>' +
        '<div class="time-ago" data-time="' + (o.ready_at || '') + '">' + timeAgo(o.ready_at) + '</div>' +
      '</div>' +
      '<button class="collected-btn" onclick="markCollected(' + o.order_id + ')">✅ Collected</button>' +
    '</div>';
  });
  pbGrid.innerHTML = html;
}

// ── MARK AS COLLECTED ──
async function markCollected(orderId) {
  const card = document.querySelector('.pb-card[data-order-id="' + orderId + '"]');
  if (card) card.classList.add('collected');
  try {
    const r = await fetch(API_BASE + '/api/pickup-display/collected', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ order_id: orderId })
    });
    if (!r.ok) {
      if (card) card.classList.remove('collected');
    }
    // Re-fetch after a brief delay for animation
    setTimeout(pollStatus, 600);
  } catch(e) {
    if (card) card.classList.remove('collected');
  }
}

// ── POLLING ──
async function pollStatus() {
  try {
    const r = await fetch(API_BASE + '/api/pickup-display/queue');
    if (!r.ok) return;
    const data = await r.json();
    const orderIds = (data.queue || []).map(o => o.order_id).join(',');
    if (orderIds !== previousOrderIds) {
      renderQueue(data.queue || []);
      previousOrderIds = orderIds;
    }
  } catch (e) {
    // Network error — silently retry
  }
}

// Update time labels every 10s
setInterval(updateClock, 10000);

// ── SOCKETIO REAL-TIME SUPPORT ──
let socket = null;
let socketEnabled = true;

function initSocketIO() {
  if (typeof io === 'undefined') { socketEnabled = false; return; }
  try {
    socket = io(API_BASE, {
      transports: ['websocket', 'polling'],
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      timeout: 10000
    });
    socket.on('connect', () => {
      socketEnabled = true;
      socket.emit('join_pickup');
      pbLiveStatus.textContent = 'Live — Connected';
    });
    socket.on('disconnect', () => {
      pbLiveStatus.textContent = 'Live — Disconnected (polling)';
    });
    socket.on('connect_error', () => { socketEnabled = false; });
    socket.on('pickup_update', () => {
      // Real-time notification — fetch latest state immediately
      pollStatus();
    });
  } catch(e) {
    socketEnabled = false;
  }
}

// ── INIT ──
initSocketIO();
pollStatus();
setInterval(pollStatus, POLL_INTERVAL);
</script>
</body>
</html>
