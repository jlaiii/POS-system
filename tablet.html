<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>Tablet Ads</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #e94560;
  --text: #eee;
  --text2: #a0a0b0;
}

/* Light theme override */
.light-theme {
  --bg: #f8f9fa;
  --card: #ffffff;
  --accent: #e94560;
  --text: #1a1a2e;
  --text2: #6c757d;
}

html, body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ---- Ad Rotator ---- */
#adContainer {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.ad-slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.8s ease-in-out;
  padding: 20px;
}

.ad-slide.active {
  opacity: 1;
}

.ad-slide img {
  max-width: 90vw;
  max-height: 75vh;
  object-fit: contain;
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.ad-title {
  margin-top: 20px;
  font-size: clamp(24px, 4vw, 48px);
  font-weight: 700;
  text-align: center;
  color: var(--accent);
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.ad-link {
  margin-top: 12px;
  color: var(--text2);
  font-size: clamp(14px, 2vw, 24px);
  text-decoration: underline;
  cursor: pointer;
}

#adDots {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: background 0.3s;
}

.dot.active {
  background: var(--accent);
  transform: scale(1.3);
}

#noAdsMessage {
  font-size: 28px;
  color: var(--text2);
  text-align: center;
  padding: 40px;
}

#connectionStatus {
  position: fixed;
  top: 16px;
  right: 16px;
  font-size: 14px;
  color: var(--text2);
  opacity: 0.7;
  z-index: 20;
}

/* Theme Toggle Button */
#themeToggle {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 25;
  background: var(--card);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  width: 48px;
  height: 48px;
  font-size: 22px;
  cursor: pointer;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, transform 0.15s, border-color 0.3s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  min-height: 48px;
  min-width: 48px;
}

#themeToggle:active {
  transform: scale(0.92);
}

.light-theme #themeToggle {
  border-color: rgba(0,0,0,0.1);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

/* Language Toggle Button */
#langToggle {
  position: fixed;
  top: 72px;
  left: 16px;
  z-index: 25;
  background: var(--card);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  width: 48px;
  height: 48px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, transform 0.15s, border-color 0.3s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  min-height: 48px;
  min-width: 48px;
}

#langToggle:active {
  transform: scale(0.92);
}

.light-theme #langToggle {
  border-color: rgba(0,0,0,0.1);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

/* ---- View Menu Button (floating over ads) ---- */
#viewMenuBtn {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 60px;
  padding: 16px 36px;
  font-size: clamp(18px, 2.5vw, 28px);
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(233,69,96,0.5);
  touch-action: manipulation;
  transition: transform 0.2s, box-shadow 0.2s;
  min-height: 60px;
  min-width: 200px;
}

#viewMenuBtn:active {
  transform: translateX(-50%) scale(0.95);
  box-shadow: 0 2px 10px rgba(233,69,96,0.3);
}

/* ---- Menu View (overlay) ---- */
#menuView {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg);
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#menuView.show {
  display: flex;
}

#menuHeader {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background: var(--card);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
  gap: 12px;
}

#backToAdsBtn {
  background: none;
  border: none;
  color: var(--text);
  font-size: clamp(20px, 3vw, 32px);
  cursor: pointer;
  padding: 12px 16px;
  min-height: 48px;
  min-width: 48px;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 12px;
}

#backToAdsBtn:active {
  background: rgba(255,255,255,0.1);
}

#menuHeader h2 {
  font-size: clamp(18px, 2.5vw, 28px);
  font-weight: 700;
  flex: 1;
}

/* Category tabs */
#catTabs {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  flex-shrink: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) transparent;
}

#catTabs::-webkit-scrollbar {
  height: 4px;
}

#catTabs::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 4px;
}

.cat-tab {
  background: var(--card);
  color: var(--text2);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 40px;
  padding: 10px 24px;
  font-size: clamp(14px, 1.8vw, 20px);
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  touch-action: manipulation;
  min-height: 48px;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}

.cat-tab.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.cat-tab:active {
  opacity: 0.8;
}

/* Item grid */
#menuItemsGrid {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 12px 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  align-content: start;
}

.menu-item-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 8px;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 1px solid rgba(255,255,255,0.06);
  min-height: 150px;
}

.menu-item-card:active {
  transform: scale(0.96);
  box-shadow: 0 0 0 2px var(--accent);
}

.menu-item-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
}

.menu-item-card .item-name {
  font-size: clamp(14px, 1.6vw, 18px);
  font-weight: 600;
  line-height: 1.3;
}

.menu-item-card .item-price {
  font-size: clamp(16px, 1.8vw, 22px);
  font-weight: 700;
  color: var(--accent);
}

.menu-item-card .item-desc {
  font-size: clamp(11px, 1.2vw, 14px);
  color: var(--text2);
  line-height: 1.4;
}

/* Item detail overlay */
#itemDetailOverlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(26,26,46,0.97);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

#itemDetailOverlay.show {
  display: flex;
}

#itemDetailOverlay .detail-close {
  position: absolute;
  top: 20px;
  left: 20px;
  background: none;
  border: none;
  color: var(--text);
  font-size: 28px;
  cursor: pointer;
  padding: 12px 16px;
  min-height: 48px;
  min-width: 48px;
  touch-action: manipulation;
  border-radius: 12px;
}

#itemDetailOverlay .detail-close:active {
  background: rgba(255,255,255,0.1);
}

#itemDetailOverlay .detail-img {
  width: min(80vw, 400px);
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

#itemDetailOverlay .detail-name {
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 700;
  text-align: center;
}

#itemDetailOverlay .detail-price {
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 700;
  color: var(--accent);
  margin-top: 8px;
}

#itemDetailOverlay .detail-desc {
  font-size: clamp(16px, 2vw, 22px);
  color: var(--text2);
  text-align: center;
  max-width: 500px;
  margin-top: 12px;
  line-height: 1.5;
}

/* Dietary badges row */
.detail-dietary {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 12px;
}

.dietary-badge {
  background: rgba(233,69,96,0.15);
  color: var(--accent);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: clamp(13px, 1.4vw, 16px);
  font-weight: 600;
  border: 1px solid rgba(233,69,96,0.25);
}

/* Modifier section in detail */
.detail-modifiers {
  width: 100%;
  max-width: 500px;
  margin-top: 16px;
}

.detail-modifiers h4 {
  font-size: clamp(14px, 1.5vw, 18px);
  color: var(--text2);
  margin-bottom: 8px;
  font-weight: 600;
  text-align: center;
}

.detail-modifier-group {
  margin-bottom: 12px;
  background: var(--card);
  border-radius: 12px;
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.06);
}

.modifier-group-name {
  font-size: clamp(13px, 1.3vw, 16px);
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.modifier-group-type {
  font-size: clamp(11px, 1vw, 13px);
  color: var(--text2);
  margin-left: 6px;
  font-weight: 400;
}

.modifier-options-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}

.modifier-option-chip {
  background: rgba(255,255,255,0.06);
  color: var(--text2);
  padding: 4px 12px;
  border-radius: 16px;
  font-size: clamp(12px, 1.1vw, 14px);
  border: 1px solid rgba(255,255,255,0.06);
}

.modifier-option-chip .price-mod {
  color: var(--accent);
  font-weight: 600;
  margin-left: 4px;
}

/* Detail navigation bar */
.detail-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  padding: 12px 0;
}

.detail-nav-btn {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  font-size: clamp(28px, 3vw, 36px);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  cursor: pointer;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.15s;
  min-height: 56px;
  min-width: 56px;
}

.detail-nav-btn:active {
  background: var(--accent);
  transform: scale(0.92);
}

.detail-nav-btn:disabled {
  opacity: 0.3;
  pointer-events: none;
}

.detail-nav-count {
  font-size: clamp(14px, 1.4vw, 16px);
  color: var(--text2);
  font-weight: 500;
}

#itemDetailOverlay .detail-meta {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

.detail-badge {
  background: var(--card);
  color: var(--text2);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: clamp(13px, 1.4vw, 16px);
  font-weight: 500;
}

/* Combo showcase row */
#comboRow {
  flex-shrink: 0;
  padding: 8px 16px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  display: none;
}

#comboRow.show {
  display: block;
}

#comboRow h3 {
  font-size: clamp(16px, 2vw, 22px);
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 10px;
  padding-left: 4px;
}

#comboCards {
  display: flex;
  gap: 12px;
}

.combo-card {
  background: linear-gradient(135deg, var(--card), #1e2a4a);
  border: 1px solid rgba(233,69,96,0.3);
  border-radius: 16px;
  padding: 16px;
  min-width: 200px;
  max-width: 280px;
  flex-shrink: 0;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.15s;
}

.combo-card:active {
  transform: scale(0.96);
}

.combo-card .combo-name {
  font-size: clamp(16px, 1.8vw, 22px);
  font-weight: 700;
  margin-bottom: 6px;
}

.combo-card .combo-price {
  font-size: clamp(18px, 2vw, 26px);
  font-weight: 700;
  color: var(--accent);
}

.combo-card .combo-original-price {
  font-size: clamp(14px, 1.4vw, 18px);
  color: var(--text2);
  text-decoration: line-through;
  margin-left: 8px;
  opacity: 0.7;
}

.combo-card .combo-savings {
  display: inline-block;
  background: #2ecc71;
  color: #fff;
  font-size: clamp(11px, 1.2vw, 14px);
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  margin-left: 8px;
  white-space: nowrap;
}

.combo-card .combo-items {
  font-size: clamp(12px, 1.2vw, 14px);
  color: var(--text2);
  margin-top: 6px;
  line-height: 1.4;
}

/* Order active overlay */
#orderActiveOverlay {
  position: fixed;
  inset: 0;
  background: rgba(26,26,46,0.92);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 50;
  padding: 40px;
}

#orderActiveOverlay.show {
  display: flex;
}

#orderActiveOverlay h1 {
  font-size: clamp(36px, 6vw, 72px);
  margin-bottom: 16px;
  color: var(--accent);
}

#orderActiveOverlay p {
  font-size: clamp(18px, 3vw, 36px);
  color: var(--text2);
  text-align: center;
  line-height: 1.6;
}

/* No items message */
#noItemsMsg {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  font-size: clamp(18px, 2vw, 24px);
}

/* ---- Auto-return countdown ---- */
#countdownOverlay {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 150;
  background: rgba(22,33,62,0.95);
  border: 1px solid var(--accent);
  border-radius: 20px;
  padding: 16px 28px;
  display: none;
  align-items: center;
  gap: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  min-height: 60px;
}

#countdownOverlay.show {
  display: flex;
}

#countdownOverlay .countdown-text {
  font-size: clamp(15px, 2vw, 20px);
  color: var(--text2);
  white-space: nowrap;
}

#countdownOverlay .countdown-number {
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 700;
  color: var(--accent);
  min-width: 32px;
  text-align: center;
}

#countdownOverlay .countdown-cancel {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 40px;
  padding: 10px 24px;
  font-size: clamp(14px, 1.6vw, 18px);
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  min-height: 44px;
  transition: transform 0.15s, opacity 0.15s;
}

#countdownOverlay .countdown-cancel:active {
  transform: scale(0.94);
  opacity: 0.8;
}

@media (max-width: 500px) {
  #countdownOverlay {
    bottom: 80px;
    padding: 12px 18px;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
}

@media (max-width: 600px) {
  .ad-title { font-size: 20px; }
  .ad-slide img { max-height: 60vh; }
  #adDots { bottom: 80px; gap: 8px; }
  .dot { width: 10px; height: 10px; }
  #viewMenuBtn { padding: 14px 28px; min-width: 160px; }
  #menuItemsGrid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
}

@media (orientation: portrait) {
  #menuItemsGrid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}

@media (orientation: landscape) {
  #menuItemsGrid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

/* ---- Restaurant Info Bar ---- */
#tabletInfoBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 40;
  background: var(--card);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  min-height: 48px;
  gap: 8px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.info-bar-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
  flex-wrap: wrap;
}

.resto-name {
  font-weight: 700;
  font-size: clamp(14px, 1.6vw, 18px);
  color: var(--accent);
  white-space: nowrap;
}

.resto-hours {
  font-size: clamp(11px, 1.2vw, 14px);
  color: var(--text2);
  white-space: nowrap;
}

.wifi-info {
  font-size: clamp(11px, 1.2vw, 14px);
  color: var(--text2);
  white-space: nowrap;
}

.wifi-info::before {
  content: '📶 ';
}

.info-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.table-num {
  font-size: clamp(14px, 1.6vw, 18px);
  font-weight: 700;
  color: var(--text);
  background: rgba(255,255,255,0.08);
  padding: 4px 12px;
  border-radius: 8px;
  white-space: nowrap;
}

#callServerBtn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 40px;
  padding: 8px 20px;
  font-size: clamp(14px, 1.6vw, 18px);
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  min-height: 44px;
  transition: transform 0.15s, box-shadow 0.15s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(233,69,96,0.4);
}

#callServerBtn:active {
  transform: scale(0.94);
  box-shadow: 0 1px 6px rgba(233,69,96,0.3);
}

#callServerBtn.called {
  background: #2ecc71;
  animation: callPulse 1s ease 3;
}

@keyframes callPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

@media (max-width: 600px) {
  #tabletInfoBar {
    flex-direction: column;
    padding: 6px 12px;
    gap: 4px;
  }
  .info-bar-left {
    justify-content: center;
    gap: 6px;
  }
  .info-bar-right {
    width: 100%;
    justify-content: center;
  }
}

/* Push content up to not overlap info bar */
#adContainer, #menuView {
  padding-bottom: 56px;
}

@media (max-width: 600px) {
  #adContainer, #menuView {
    padding-bottom: 80px;
  }
}
</style>
</head>
<body>

<!-- Theme & Language Toggle Buttons (top-left corner) -->
<button id="themeToggle" aria-label="Toggle light/dark theme">🌙</button>
<button id="langToggle" aria-label="Switch language" style="position:fixed;top:72px;left:16px;z-index:25;background:var(--card);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:50%;width:48px;height:48px;font-size:18px;font-weight:700;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;transition:background 0.3s,transform 0.15s;box-shadow:0 2px 12px rgba(0,0,0,0.3);min-height:48px;min-width:48px;">EN</button>

<!-- Ad Rotator -->
<div id="adContainer">
  <div id="adSlides"></div>
  <div id="adDots"></div>
  <div id="noAdsMessage"><span data-i18n="no_ads">No ads available</span><br/><span style="font-size:18px;color:var(--text2);" data-i18n="waiting_content">Waiting for content...</span></div>
  <div id="connectionStatus" data-i18n="connected">● Connected</div>
</div>

<!-- View Menu Floating Button -->
<button id="viewMenuBtn" data-i18n="view_menu">🍽️ View Menu</button>

<!-- Menu View Overlay -->
<div id="menuView">
  <div id="menuHeader">
    <button id="backToAdsBtn">← <span data-i18n="back">Back</span></button>
    <h2><span data-i18n="our_menu">📋 Our Menu</span></h2>
  </div>
  <div id="catTabs"></div>
  <div id="comboRow">
    <h3 data-i18n="featured_combos">🔥 Featured Combos</h3>
    <div id="comboCards"></div>
  </div>
  <div id="menuItemsGrid">
    <div id="noItemsMsg">Loading menu...</div>
  </div>
</div>

<!-- Item Detail Overlay -->
<div id="itemDetailOverlay" onclick="closeItemDetail(event)">
  <button class="detail-close" onclick="closeItemDetail()" data-i18n="back_detail">← Back</button>
  <div class="detail-inner" style="width:100%;max-width:500px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;padding:20px 24px 10px;max-height:90vh;">
    <img class="detail-img" id="detailImg" src="" alt=""/>
    <div class="detail-name" id="detailName"></div>
    <div class="detail-price" id="detailPrice"></div>
    <div class="detail-dietary" id="detailDietary"></div>
    <div class="detail-desc" id="detailDesc"></div>
    <div class="detail-modifiers" id="detailModifiers"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <!-- Navigation -->
    <div class="detail-nav">
      <button class="detail-nav-btn" id="detailPrevBtn" onclick="navigateItem(-1)">‹</button>
      <span class="detail-nav-count" id="detailNavCount"></span>
      <button class="detail-nav-btn" id="detailNextBtn" onclick="navigateItem(1)">›</button>
    </div>
  </div>
</div>

<div id="orderActiveOverlay">
  <h1>🍽️ <span data-i18n="order_in_progress">Order in Progress</span></h1>
  <p><span data-i18n="order_active_msg">Your table has an active order.</span><br/><span data-i18n="order_active_msg2">Please wait while we prepare your items.</span></p>
</div>

<!-- Auto-return countdown toast -->
<div id="countdownOverlay">
  <span class="countdown-text"><span data-i18n="returning_to_ads">↩️ Returning to ads in</span></span>
  <span class="countdown-number" id="countdownNumber">5</span>
  <button class="countdown-cancel" id="countdownCancelBtn" data-i18n="stay">✕ Stay</button>
</div>

<!-- Restaurant Info Bar -->
<div id="tabletInfoBar">
  <div class="info-bar-left">
    <span class="resto-name" id="restaurantName">Our Restaurant</span>
    <span class="resto-hours" id="restaurantHours"></span>
    <span class="wifi-info" id="wifiInfo"></span>
  </div>
  <div class="info-bar-right">
    <span class="table-num" id="tableNumber" data-i18n="table_label">Table: --</span>
    <button id="callServerBtn" data-i18n="call_server">📞 Call Server</button>
  </div>
</div>

<script>
const BACKEND = '';
let adsData = { ads: [], interval: 10 };
let currentIndex = 0;
let rotateTimer = null;
let pollTimer = null;
let menuItemsData = {};
let categories = [];
let activeCategory = '';
let combosData = [];
let idleTimer = null;
let countdownTimer = null;
let countdownValue = 5;
const IDLE_TIMEOUT = 45000; // 45s idle → show countdown
const COUNTDOWN_SECONDS = 5; // 5s countdown before auto-return
let detailCategoryItems = []; // Items in current category for navigation
let detailCurrentIdx = 0; // Current index in detailCategoryItems

// Dietary tag icon mapping
const DIETARY_ICONS = {
  'vegetarian': '🌿', 'vegan': '🥦', 'gluten-free': '🌾',
  'spicy': '🌶️', 'nuts': '🥜', 'dairy': '🥛',
  'eggs': '🥚', 'seafood': '🦐', 'shellfish': '🦐',
  'soy': '🫘', 'organic': '🌱', 'halal': '☪️',
  'kosher': '✡️', 'sugar-free': '🍃', 'low-carb': '🥬'
};

// ═══════════ MULTI-LANGUAGE SUPPORT ═══════════
const L10N = {
  en: {
    'no_ads': 'No ads available',
    'waiting_content': 'Waiting for content...',
    'connected': '● Connected',
    'disconnected': '○ Disconnected',
    'view_menu': '🍽️ View Menu',
    'back': 'Back',
    'our_menu': '📋 Our Menu',
    'featured_combos': '🔥 Featured Combos',
    'loading_menu': 'Loading menu...',
    'could_not_load_menu': 'Could not load menu.',
    'no_items_category': 'No items in this category.',
    'back_detail': '← Back',
    'order_in_progress': 'Order in Progress',
    'order_active_msg': 'Your table has an active order.',
    'order_active_msg2': 'Please wait while we prepare your items.',
    'returning_to_ads': '↩️ Returning to ads in',
    'stay': '✕ Stay',
    'our_restaurant': 'Our Restaurant',
    'table_label': 'Table: --',
    'table_label_dynamic': '🍽️ Table {table}',
    'call_server': '📞 Call Server',
    'server_called': '✅ Server Called',
    'learn_more': '🔗 Learn More',
    'customize_order': '⚙️ Customize Your Order',
    'choose_any': '(Choose any)',
    'choose_one': '(Choose one)',
    'combo_suffix': '(Combo)',
    'includes': '🍽️ Includes:',
    'combo_deal': '🔥 Combo Deal',
    'lang_name': 'EN',
    'lang_other': 'ES',
    'unknown_table': 'Unknown',
  },
  es: {
    'no_ads': 'No hay anuncios',
    'waiting_content': 'Esperando contenido...',
    'connected': '● Conectado',
    'disconnected': '○ Desconectado',
    'view_menu': '🍽️ Ver Menú',
    'back': 'Atrás',
    'our_menu': '📋 Nuestro Menú',
    'featured_combos': '🔥 Combos Destacados',
    'loading_menu': 'Cargando menú...',
    'could_not_load_menu': 'No se pudo cargar el menú.',
    'no_items_category': 'No hay artículos en esta categoría.',
    'back_detail': '← Atrás',
    'order_in_progress': 'Pedido en Progreso',
    'order_active_msg': 'Su mesa tiene un pedido activo.',
    'order_active_msg2': 'Espere mientras preparamos sus artículos.',
    'returning_to_ads': '↩️ Volviendo a anuncios en',
    'stay': '✕ Quedarse',
    'our_restaurant': 'Nuestro Restaurante',
    'table_label': 'Mesa: --',
    'table_label_dynamic': '🍽️ Mesa {table}',
    'call_server': '📞 Llamar Mesero',
    'server_called': '✅ Mesero Llamado',
    'learn_more': '🔗 Más Información',
    'customize_order': '⚙️ Personaliza tu Pedido',
    'choose_any': '(Elige cualquiera)',
    'choose_one': '(Elige uno)',
    'combo_suffix': '(Combo)',
    'includes': '🍽️ Incluye:',
    'combo_deal': '🔥 Combo Oferta',
    'lang_name': 'ES',
    'lang_other': 'EN',
    'unknown_table': 'Desconocida',
  }
};

let currentLang = localStorage.getItem('tablet_lang') || 'en';

/** Translate a key with optional variable interpolation {var} */
function t(key, vars) {
  const langData = L10N[currentLang] || L10N.en;
  let str = langData[key] || L10N.en[key] || key;
  if (vars) {
    for (const [k, v] of Object.entries(vars)) {
      str = str.replace(new RegExp('\\{' + k + '\\}', 'g'), String(v));
    }
  }
  return str;
}

/** Apply translations to all elements with data-i18n attribute */
function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  // Update lang toggle button text
  const langBtn = document.getElementById('langToggle');
  if (langBtn) {
    langBtn.textContent = currentLang === 'en' ? 'EN' : 'ES';
  }
  // Update dynamic elements
  document.getElementById('connectionStatus').textContent = t('connected');
  document.getElementById('connectionStatus').style.color = '#4ade80';
}

/** Toggle language */
function toggleLang() {
  currentLang = currentLang === 'en' ? 'es' : 'en';
  localStorage.setItem('tablet_lang', currentLang);
  applyTranslations();
  // Refresh any rendered items with dynamic strings
  if (Object.keys(menuItemsData).length > 0) renderItems();
  if (combosData.length > 0) renderCombos();
}

// ---- Ad functions ----
async function fetchAds() {
  try {
    const r = await fetch(BACKEND + '/api/ads/current');
    if (!r.ok) throw new Error('Fetch failed');
    adsData = await r.json();
    document.getElementById('connectionStatus').textContent = t('connected');
    document.getElementById('connectionStatus').style.color = '#4ade80';
    renderAds();
  } catch (e) {
    document.getElementById('connectionStatus').textContent = t('disconnected');
    document.getElementById('connectionStatus').style.color = '#e94560';
  }
  applyTranslations();
}

function renderAds() {
  const ads = adsData.ads || [];
  const interval = adsData.interval || 10;
  const slidesEl = document.getElementById('adSlides');
  const dotsEl = document.getElementById('adDots');
  const noAdsEl = document.getElementById('noAdsMessage');

  if (ads.length === 0) {
    slidesEl.innerHTML = '';
    dotsEl.innerHTML = '';
    noAdsEl.style.display = 'block';
    if (rotateTimer) clearInterval(rotateTimer);
    rotateTimer = null;
    return;
  }

  noAdsEl.style.display = 'none';

  slidesEl.innerHTML = ads.map((ad, i) => `
    <div class="ad-slide ${i === 0 ? 'active' : ''}" data-index="${i}" onclick="handleAdClick('${escHtml(ad.link_url || '')}')">
      <img src="${escHtml(ad.image_url)}" alt="${escHtml(ad.title)}" loading="${i === 0 ? 'eager' : 'lazy'}"/>
      <div class="ad-title">${escHtml(ad.title)}</div>
      ${ad.link_url ? '<div class="ad-link" data-i18n="learn_more">🔗 Learn More</div>' : ''}
    </div>
  `).join('');

  dotsEl.innerHTML = ads.map((_, i) => `
    <div class="dot ${i === 0 ? 'active' : ''}" onclick="goToAd(${i})"></div>
  `).join('');

  currentIndex = 0;

  if (rotateTimer) clearInterval(rotateTimer);
  rotateTimer = setInterval(() => {
    nextAd();
  }, interval * 1000);
}

function nextAd() {
  const ads = adsData.ads || [];
  if (ads.length < 2) return;
  goToAd((currentIndex + 1) % ads.length);
}

function goToAd(index) {
  const ads = adsData.ads || [];
  if (index < 0 || index >= ads.length) return;
  currentIndex = index;

  document.querySelectorAll('.ad-slide').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
  document.querySelectorAll('.dot').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
}

function handleAdClick(url) {
  if (url) window.open(url, '_blank');
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ---- Menu functions ----
async function fetchMenuItems() {
  document.getElementById('noItemsMsg').textContent = t('loading_menu');
  try {
    const r = await fetch(BACKEND + '/api/items');
    if (!r.ok) throw new Error('Fetch failed');
    menuItemsData = await r.json();
    // Build category list (exclude empty categories)
    categories = Object.keys(menuItemsData).filter(cat => {
      return Array.isArray(menuItemsData[cat]) && menuItemsData[cat].length > 0;
    });
    if (categories.length > 0) {
      activeCategory = categories[0];
    }
    renderCategoryTabs();
    renderItems();
  } catch (e) {
    document.getElementById('noItemsMsg').textContent = t('could_not_load_menu');
  }
  applyTranslations();
}

async function fetchCombos() {
  try {
    const r = await fetch(BACKEND + '/api/combos/list');
    if (!r.ok) throw new Error('Fetch failed');
    const data = await r.json();
    combosData = (data.combos || []).filter(c => c.active !== false);
    renderCombos();
  } catch (e) {
    // combos are optional
  }
}

function renderCategoryTabs() {
  const el = document.getElementById('catTabs');
  if (categories.length === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = categories.map(cat => `
    <button class="cat-tab ${cat === activeCategory ? 'active' : ''}" data-cat="${escHtml(cat)}" onclick="switchCategory('${escHtml(cat)}')">${escHtml(cat)}</button>
  `).join('');
}

function switchCategory(cat) {
  activeCategory = cat;
  // Update tab UI
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  renderItems();
  resetIdleTimer();
}

function renderItems() {
  const grid = document.getElementById('menuItemsGrid');
  const items = (menuItemsData[activeCategory] || []).filter(it => it.active !== false);

  if (items.length === 0) {
    grid.innerHTML = '<div id="noItemsMsg" data-i18n="no_items_category">No items in this category.</div>';
    return;
  }

  grid.innerHTML = items.map(item => `
    <div class="menu-item-card" onclick="showItemDetail('${escHtml(item.name)}')">
      ${item.image_url ? `<img src="${escHtml(item.image_url)}" alt="${escHtml(item.name)}" loading="lazy"/>` : ''}
      <div class="item-name">${escHtml(item.name)}</div>
      <div class="item-price">$${parseFloat(item.price).toFixed(2)}</div>
      ${item.description ? `<div class="item-desc">${escHtml(item.description)}</div>` : ''}
    </div>
  `).join('');
  applyTranslations();
}

function renderCombos() {
  const row = document.getElementById('comboRow');
  const cards = document.getElementById('comboCards');
  if (!combosData.length) {
    row.classList.remove('show');
    return;
  }
  row.classList.add('show');
  cards.innerHTML = combosData.map(combo => {
    // Calculate original total of child items
    let originalTotal = 0;
    const childItems = combo.child_items || [];
    childItems.forEach(ci => {
      const qty = ci.qty || 1;
      // Look up item price from menu data
      let itemPrice = 0;
      const catItems = menuItemsData[ci.category] || [];
      const found = catItems.find(it => it.name === ci.name);
      if (found) {
        itemPrice = parseFloat(found.price) || 0;
      }
      originalTotal += itemPrice * qty;
    });
    const comboPrice = parseFloat(combo.combo_price) || 0;
    const savings = originalTotal > comboPrice ? originalTotal - comboPrice : 0;

    // Build child items display string
    const itemsStr = childItems.map(ci => escHtml(ci.name) + (ci.qty > 1 ? ' x' + ci.qty : '')).join(' + ');

    return `<div class="combo-card" onclick="showComboDetail('${escHtml(combo.name)}')">
      <div class="combo-name">${escHtml(combo.name)}</div>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">
        <span class="combo-price">$${comboPrice.toFixed(2)}</span>
        ${savings > 0 ? `<span class="combo-original-price">$${originalTotal.toFixed(2)}</span><span class="combo-savings">Save $${savings.toFixed(2)}</span>` : ''}
      </div>
      <div class="combo-items">${itemsStr}</div>
    </div>`;
  }).join('');
}

// ---- Item Detail ----
// Find item by name across all categories
function findItemByName(name) {
  for (const cat of Object.keys(menuItemsData)) {
    const items = menuItemsData[cat] || [];
    for (const item of items) {
      if (item.name === name) return item;
    }
  }
  return null;
}

function showItemDetail(name) {
  const item = findItemByName(name);
  if (!item) return;

  // Build the list of items in same category for nav
  const itemsInCat = (menuItemsData[activeCategory] || []).filter(it => it.active !== false);
  detailCategoryItems = itemsInCat;
  detailCurrentIdx = itemsInCat.findIndex(it => it.name === name);
  if (detailCurrentIdx === -1) detailCurrentIdx = 0;

  renderItemDetail(item);
  document.getElementById('itemDetailOverlay').classList.add('show');
  resetIdleTimer();
}

function renderItemDetail(item) {
  // Image
  document.getElementById('detailImg').src = item.image_url || '';
  document.getElementById('detailImg').style.display = item.image_url ? 'block' : 'none';
  document.getElementById('detailName').textContent = item.name;
  document.getElementById('detailPrice').textContent = '$' + parseFloat(item.price).toFixed(2);
  document.getElementById('detailDesc').textContent = item.description || '';

  // Dietary badges
  const dietaryEl = document.getElementById('detailDietary');
  const tags = item.dietary_tags || [];
  if (tags.length > 0) {
    dietaryEl.innerHTML = tags.map(tag => {
      const icon = DIETARY_ICONS[tag.toLowerCase().trim()] || '🏷️';
      return `<span class="dietary-badge">${icon} ${escHtml(tag)}</span>`;
    }).join('');
    dietaryEl.style.display = 'flex';
  } else {
    dietaryEl.style.display = 'none';
  }

  // Modifier groups
  const modEl = document.getElementById('detailModifiers');
  const modifiers = item.modifiers || {};
  const groups = modifiers.groups || [];
  if (groups.length > 0) {
    modEl.innerHTML = '<h4>' + t('customize_order') + '</h4>' + groups.map(g => {
      const typeLabel = g.type === 'multiple' ? t('choose_any') : t('choose_one');
      const optionsHtml = (g.options || []).map(opt => {
        const priceStr = opt.price_mod && opt.price_mod > 0
          ? `<span class="price-mod">+$${parseFloat(opt.price_mod).toFixed(2)}</span>`
          : opt.price_mod && opt.price_mod < 0
            ? `<span class="price-mod">-$${Math.abs(parseFloat(opt.price_mod)).toFixed(2)}</span>`
            : '';
        return `<span class="modifier-option-chip">${escHtml(opt.name)}${priceStr}</span>`;
      }).join('');
      return `<div class="detail-modifier-group">
        <div class="modifier-group-name">${escHtml(g.name)} <span class="modifier-group-type">${typeLabel}</span></div>
        <div class="modifier-options-list">${optionsHtml}</div>
      </div>`;
    }).join('');
    modEl.style.display = 'block';
  } else {
    modEl.style.display = 'none';
  }

  // Meta badges (course, barcode)
  const metaEl = document.getElementById('detailMeta');
  let badges = [];
  if (item.course) badges.push('🍽️ ' + item.course.charAt(0).toUpperCase() + item.course.slice(1));
  if (item.barcode) badges.push('📦 ' + item.barcode);
  metaEl.innerHTML = badges.map(b => `<span class="detail-badge">${b}</span>`).join('');

  // Update nav buttons
  updateDetailNav();
}

function updateDetailNav() {
  const prevBtn = document.getElementById('detailPrevBtn');
  const nextBtn = document.getElementById('detailNextBtn');
  const countEl = document.getElementById('detailNavCount');
  prevBtn.disabled = detailCurrentIdx <= 0;
  nextBtn.disabled = detailCurrentIdx >= detailCategoryItems.length - 1;
  countEl.textContent = detailCategoryItems.length > 0
    ? `${detailCurrentIdx + 1} / ${detailCategoryItems.length}`
    : '';
}

function navigateItem(direction) {
  const newIdx = detailCurrentIdx + direction;
  if (newIdx < 0 || newIdx >= detailCategoryItems.length) return;
  detailCurrentIdx = newIdx;
  const item = detailCategoryItems[newIdx];
  if (item) {
    renderItemDetail(item);
  }
  resetIdleTimer();
}

function closeItemDetail(e) {
  if (e && e.target !== e.currentTarget) return; // Only close when clicking backdrop
  document.getElementById('itemDetailOverlay').classList.remove('show');
  detailCategoryItems = [];
  detailCurrentIdx = 0;
  resetIdleTimer();
}

function showComboDetail(name) {
  const combo = combosData.find(c => c.name === name);
  if (!combo) return;

  // For combos, show in detail popup
  detailCategoryItems = combosData;
  detailCurrentIdx = combosData.findIndex(c => c.name === name);
  if (detailCurrentIdx === -1) detailCurrentIdx = 0;

  const comboPrice = parseFloat(combo.combo_price) || 0;
  const childItems = combo.child_items || [];

  // Calculate savings
  let originalTotal = 0;
  childItems.forEach(ci => {
    const qty = ci.qty || 1;
    let itemPrice = 0;
    const catItems = menuItemsData[ci.category] || [];
    const found = catItems.find(it => it.name === ci.name);
    if (found) {
      itemPrice = parseFloat(found.price) || 0;
    }
    originalTotal += itemPrice * qty;
  });
  const savings = originalTotal > comboPrice ? originalTotal - comboPrice : 0;

  // Build child items HTML
  const childrenHtml = childItems.map(ci =>
    `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
      <span>🍱 ${escHtml(ci.name)}</span>
      <span style="color:var(--accent);font-weight:600;">x${ci.qty || 1}</span>
    </div>`
  ).join('');

  document.getElementById('detailImg').style.display = 'none';
  document.getElementById('detailName').textContent = combo.name + ' ' + t('combo_suffix');
  document.getElementById('detailPrice').innerHTML = `
    <span style="color:var(--accent);font-weight:700;">$${comboPrice.toFixed(2)}</span>
    ${savings > 0 ? `<span style="text-decoration:line-through;color:var(--text2);opacity:0.7;margin-left:10px;font-size:clamp(18px,2vw,24px);">$${originalTotal.toFixed(2)}</span>
    <span style="background:#2ecc71;color:#fff;padding:2px 12px;border-radius:20px;font-size:clamp(12px,1.2vw,14px);margin-left:8px;font-weight:700;">Save $${savings.toFixed(2)}</span>` : ''}
  `;
  document.getElementById('detailDesc').innerHTML = childrenHtml
    ? `<div style="margin-top:8px;background:var(--card);border-radius:12px;padding:10px 14px;max-width:400px;text-align:left;">
      <div style="font-size:clamp(13px,1.3vw,16px);font-weight:600;margin-bottom:6px;color:var(--text2);">${t('includes')}</div>
      ${childrenHtml}
    </div>`
    : t('includes') + ' ' + childItems.map(ci => escHtml(ci.name)).join(' + ');
  document.getElementById('detailDietary').style.display = 'none';
  document.getElementById('detailModifiers').style.display = 'none';
  document.getElementById('detailMeta').innerHTML = '<span class="detail-badge">' + t('combo_deal') + '</span>';
  updateDetailNav();

  document.getElementById('itemDetailOverlay').classList.add('show');
  resetIdleTimer();
}

// ---- View toggle ----
function showMenuView() {
  document.getElementById('adContainer').style.display = 'none';
  document.getElementById('viewMenuBtn').style.display = 'none';
  document.getElementById('menuView').classList.add('show');
  // Pause ad rotation while in menu
  if (rotateTimer) {
    clearInterval(rotateTimer);
    rotateTimer = null;
  }
  resetIdleTimer();
}

function showAdsView() {
  document.getElementById('menuView').classList.remove('show');
  document.getElementById('adContainer').style.display = 'flex';
  document.getElementById('viewMenuBtn').style.display = 'block';
  // Resume ad rotation
  const interval = adsData.interval || 10;
  if (rotateTimer) clearInterval(rotateTimer);
  rotateTimer = setInterval(() => {
    nextAd();
  }, interval * 1000);
  // Cancel any timers
  cancelCountdown();
  if (idleTimer) {
    clearTimeout(idleTimer);
    idleTimer = null;
  }
}

function resetIdleTimer() {
  // Cancel any existing idle or countdown
  if (idleTimer) clearTimeout(idleTimer);
  cancelCountdown();
  // Start idle timer that leads to countdown
  idleTimer = setTimeout(() => {
    startCountdown();
  }, IDLE_TIMEOUT);
}

function startCountdown() {
  // Only start countdown if menu view is open and detail overlay is not showing
  if (!document.getElementById('menuView').classList.contains('show')) return;
  // Don't start countdown if detail overlay is open — customer is actively browsing
  if (document.getElementById('itemDetailOverlay').classList.contains('show')) {
    resetIdleTimer();
    return;
  }

  countdownValue = COUNTDOWN_SECONDS;
  document.getElementById('countdownNumber').textContent = countdownValue;
  document.getElementById('countdownOverlay').classList.add('show');

  countdownTimer = setInterval(() => {
    countdownValue--;
    document.getElementById('countdownNumber').textContent = countdownValue;
    if (countdownValue <= 0) {
      // Time's up — return to ads
      cancelCountdown();
      showAdsView();
    }
  }, 1000);
}

function cancelCountdown() {
  if (countdownTimer) {
    clearInterval(countdownTimer);
    countdownTimer = null;
  }
  document.getElementById('countdownOverlay').classList.remove('show');
}

// ---- Event listeners ----
document.getElementById('viewMenuBtn').addEventListener('click', () => {
  showMenuView();
  fetchMenuItems();
  fetchCombos();
});

document.getElementById('backToAdsBtn').addEventListener('click', () => {
  showAdsView();
});

// Cancel auto-return countdown when user taps "Stay" or anywhere on menu
document.getElementById('countdownCancelBtn').addEventListener('click', () => {
  cancelCountdown();
  resetIdleTimer();
});

// Also intercept any touch on menu view to reset idle timer and cancel countdown
document.getElementById('menuView').addEventListener('touchstart', () => {
  cancelCountdown();
  resetIdleTimer();
}, { passive: true });
document.getElementById('menuView').addEventListener('click', () => {
  cancelCountdown();
  resetIdleTimer();
}, { passive: true });

// ---- Theme Toggle (Dark/Light) ----
function initThemeToggle() {
  const savedTheme = localStorage.getItem('tablet_theme');
  if (savedTheme === 'light') {
    document.body.classList.add('light-theme');
    document.getElementById('themeToggle').textContent = '☀️';
  }

  document.getElementById('themeToggle').addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light-theme');
    document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem('tablet_theme', isLight ? 'light' : 'dark');
  });
}

// ---- Init ----
fetchAds();
pollTimer = setInterval(fetchAds, 30000);

// Touch swipe support for ads
let touchStartX = 0;
let touchEndX = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, { passive: true });
document.addEventListener('touchend', e => {
  touchEndX = e.changedTouches[0].screenX;
  const diff = touchStartX - touchEndX;
  const ads = adsData.ads || [];

  // If detail overlay is open, swipe browses items
  const detailOpen = document.getElementById('itemDetailOverlay').classList.contains('show');
  if (detailOpen && Math.abs(diff) > 50) {
    if (diff > 0) navigateItem(1);
    else navigateItem(-1);
    return;
  }

  if (Math.abs(diff) > 50) {
    if (diff > 0) nextAd();
    else goToAd((currentIndex - 1 + ads.length) % ads.length);
  }
}, { passive: true });

// Keyboard support
document.addEventListener('keydown', e => {
  const detailOpen = document.getElementById('itemDetailOverlay').classList.contains('show');
  const ads = adsData.ads || [];
  if (detailOpen) {
    if (e.key === 'ArrowRight') { navigateItem(1); e.preventDefault(); }
    else if (e.key === 'ArrowLeft') { navigateItem(-1); e.preventDefault(); }
    else if (e.key === 'Escape') { closeItemDetail(); e.preventDefault(); }
    return;
  }
  if (e.key === 'ArrowRight') nextAd();
  else if (e.key === 'ArrowLeft') goToAd((currentIndex - 1 + ads.length) % ads.length);
  else if (e.key === 'Escape') {
    if (document.getElementById('menuView').classList.contains('show')) {
      showAdsView();
    }
  }
});

// ═══════════ RESTAURANT INFO BAR ═══════════

// Parse table number from URL (?table=5)
function getTableNumber() {
  const params = new URLSearchParams(window.location.search);
  return params.get('table') || null;
}

// Fetch restaurant info and populate the info bar
async function loadRestaurantInfo() {
  try {
    const r = await fetch(BACKEND + '/api/restaurant/info');
    if (!r.ok) throw new Error('Fetch failed');
    const config = await r.json();
    document.getElementById('restaurantName').textContent = config.name || t('our_restaurant');
    if (config.hours_today) {
      document.getElementById('restaurantHours').textContent = '🕐 ' + config.hours_today;
    }
    let wifiStr = '';
    if (config.wifi_name) {
      wifiStr = config.wifi_name;
      if (config.wifi_password) wifiStr += ' 🔑 ' + config.wifi_password;
    }
    document.getElementById('wifiInfo').textContent = wifiStr;
  } catch (e) {
    // Keep defaults
  }
}

// SocketIO connection for call server
let tabletSocket = null;
function initTabletSocket() {
  if (typeof io === 'undefined') return;
  try {
    tabletSocket = io(BACKEND, {
      transports: ['websocket', 'polling'],
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      timeout: 10000
    });
  } catch(e) {
    // Socket not available, call server will use fallback
  }
}

// Call server button
document.addEventListener('DOMContentLoaded', () => {
  initThemeToggle();
  const tableNum = getTableNumber();
  const tableEl = document.getElementById('tableNumber');
  if (tableNum) {
    tableEl.textContent = t('table_label_dynamic', { table: tableNum });
  }
  
  // Language toggle
  const langBtn = document.getElementById('langToggle');
  if (langBtn) {
    langBtn.addEventListener('click', toggleLang);
  }
  applyTranslations();
  
  loadRestaurantInfo();
  initTabletSocket();

  const callBtn = document.getElementById('callServerBtn');
  callBtn.addEventListener('click', () => {
    const table = getTableNumber() || t('unknown_table');
    // Emit via SocketIO
    if (tabletSocket && tabletSocket.connected) {
      tabletSocket.emit('tablet_call_server', { table_number: table });
    } else {
      // Fallback: use REST endpoint
      fetch(BACKEND + '/api/tablet/call-server', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ table_number: table })
      }).catch(() => {});
    }
    // Visual feedback
    callBtn.textContent = t('server_called');
    callBtn.classList.add('called');
    setTimeout(() => {
      callBtn.textContent = t('call_server');
      callBtn.classList.remove('called');
    }, 4000);
  });
});
</script>
